name: moodfood_ai
description: AI Chef - Generate recipes from your fridge ingredients
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Red
  dio: ^5.4.3

  # Navegación
  go_router: ^14.2.0

  # Cámara e imagen
  image_picker: ^1.1.2
  camera: ^0.11.0

  # Utilidades
  flutter_animate: ^4.5.0
  flutter_dotenv: ^5.1.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  logger: ^2.3.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/animations/